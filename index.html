<!-- Map Buddy version 02-27-01-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="iphoneIcon.png">
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English+SC&family=Cormorant:wght@400;500;600&display=swap" rel="stylesheet">

<title>MAP BUDDY ©2026 Bugman Industries LLC</title>
<style>
body { margin:0; height:100vh; font-family: "Cormorant", serif; }

label, .hint, button, input, textarea { font-family: "Cormorant", serif; }
#hexId { font-family: "IM Fell English SC", serif; }

#app { height:100vh; display:grid; grid-template-columns: 1fr 360px; }

#left{
  background-image: url("WaterBackground.jpeg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  min-width:0;
  overflow:auto;
  -webkit-overflow-scrolling: touch;
}

#wrap { padding:16px; }
#grid { display:block; border-radius:16px; }
#status { color:#aaa; font-size:12px; margin-top:10px; }

#panel {
  width:360px;
  padding:14px;
  box-sizing:border-box;
  overflow:auto;

  background-image: url("WoodPanel3.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  border-left:1px solid #ddd;

  position: relative; /* anchor icon popover */
}

label { display:block; font-size:12px; margin-top:10px; color:#333; }
input, textarea { width:100%; box-sizing:border-box; padding:8px; border:1px solid #ccc; border-radius:10px; background:white; font-size: 20px; }
textarea { height:210px; resize:vertical; }

.row { display:flex; gap:10px; margin-top:10px; }
.row > * { flex:1; }

button { margin-top:10px; padding:8px 10px; border:1px solid #bbb; border-radius:10px; background:white; cursor:pointer; }
button:hover { background:#eee; }

.hint { font-size:12px; color:#666; margin-top:6px; }

.bugmanText { font-size:18px; color:#ffffff; margin-top:6px; }

.palette { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }

button { box-sizing: border-box; }

/* ---- Palette row: force all controls to be identical size and aligned ---- */
.palette-row{
  display:flex;
  align-items:center;
  gap:8px;
}
.palette-row > *{ flex:0 0 auto; }
#palette{
  flex:1 1 auto;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:0; /* IMPORTANT: keeps swatches aligned with the controls */
}

/* Swatches */
.swatch{
  width:26px;
  height:26px;
  min-width:26px;
  min-height:26px;
  border-radius:8px;
  border:1px solid rgba(0,0,0,0.15);
  box-sizing:border-box;
  cursor:pointer;
}

/* Shared box metrics for color input + buttons */
#color,
#clearColor,
#iconBtn{
  width:26px;
  height:26px;
  min-width:26px;
  min-height:26px;
  padding:0;
  margin:0;
  box-sizing:border-box;
  border-radius:8px;

  display:inline-flex;
  align-items:center;
  justify-content:center;
  line-height:1;
}

/* Override global button spacing for the small controls */
#clearColor,
#iconBtn{
  margin-top:0;
  padding:0;
  border:1px solid rgba(0,0,0,0.15);
  background:#fff;
}

/* Make the color input behave like a normal square control */
#color{
  margin-top:0;
  padding:0;
  -webkit-appearance:none;
  appearance:none;
  border:1px solid rgba(0,0,0,0.15);
  background:#fff;
}
#color::-webkit-color-swatch-wrapper{ padding:0; }
#color::-webkit-color-swatch{
  border:none;
  border-radius:8px;
}
#color::-moz-color-swatch{
  border:none;
  border-radius:8px;
}

#closePanel { display:none; width:100%; }

/* Campaign/Dungeon buttons: 2x2 grid */
.actions-row{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
  margin-top:10px;
}
.actions-row button{
  margin-top:0;
  font-size:20px;
  padding:6px 8px;
  width:100%;
}

.dungeonBtn:enabled {
  color: #c40000; /* deep red */
  font-weight: 600;
}

#hexId {
  color: #ffffff;
  font-size: 40px;
  font-weight: 300;
}

/* ---- Icon picker popover ---- */
#iconPicker{
  position:absolute;
  display:none;
  width: 152px;
  padding: 8px;
  border-radius: 12px;
  background: rgba(255,255,255,0.95);
  border: 1px solid rgba(0,0,0,0.2);
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  z-index: 100;
}
#iconPicker.open{ display:block; }

.iconGrid{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.iconCell{
  width: 42px;
  height: 42px;
  border-radius: 10px;
  border: 1px solid rgba(0,0,0,0.15);
  background: white;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  user-select:none;
  font-size: 28px;
  line-height: 1;
}
.iconCell:hover{ background: rgba(0,0,0,0.06); }

@media (max-width: 900px){
  #app { grid-template-columns: 1fr; }
  #panel{
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: 50vh;
    transform: translateY(100%);
    transition: transform 180ms ease;
    border-top-left-radius: 16px;
    border-top-right-radius: 16px;
    box-shadow: 0 -10px 40px rgba(0,0,0,0.35);
    z-index: 50;
  }
  body.panel-open #panel{ transform: translateY(0); }

  #closePanel{
    display:block;
    width:100%;
    color:#b00000;
    border-color:#b00000;
    font-weight:600;
  }
}
</style>
</head>
<body>
  <div id="app">
    <div id="left">
      <div id="wrap">
        <!-- the "container for the hex grid generated in JS (buildGrid)" -->
        <svg id="grid"></svg>
        <div id="status"></div>
      </div>
    </div>

    <div id="panel">
      <div style="font-weight:200; font-size:30px; color:#ffffff; text-align:center;">A Journey</div>
      <div style="font-weight:200; font-size:24px; color:#ffffff; text-align:center;">of</div>
      <div style="font-weight:200; font-size:48px; color:#ffffff; text-align:center;">The Implication</div>

      <div class="hint" id="hexId">Click a hex…</div>

      <label>Color</label>
      <div class="row palette-row">
        <div class="palette" id="palette"></div>

        <input id="color" type="color" title="Pick color" value="#2a2a2a" />
        <button id="clearColor" type="button" title="Clear">✕</button>

        <button id="iconBtn" type="button" title="Choose icon">✶</button>
      </div>

      <div id="iconPicker" aria-hidden="true">
        <div class="iconGrid" id="iconGrid"></div>
      </div>

      <label>Notes</label>
      <textarea id="notes" placeholder="What’s here? Encounters, landmarks, factions…"></textarea>

      <div class="actions-row">
        <button id="openDungeonBtn" class="dungeonBtn" type="button">Open Dungeon</button>
        <button id="exportBtn" type="button">Export Campaign</button>
        <button id="importBtn" type="button">Import Campaign</button>
        <button id="wipeBtn" type="button">Wipe Campaign</button>
      </div>
      <input id="importFile" type="file" accept="application/json" style="display:none;" />

      <button id="closePanel" type="button">Close</button>
      <br>
      <div class="bugmanText">Map Buddy ©2026 Bugman Industries LLC</div>
    </div>

<script type="module">
import { makeHexMath, buildHexSvgGrid } from "./hexSvgGrid.js";
import { exportCampaign, importCampaignFromFile, wipeCampaign, importCampaignFromUrl } from "./campaignStore.js";


function isAuthorMode() {
  const p = new URLSearchParams(location.search);
  if (p.get("author") === "1") return true;
  // optional: persistent author mode
  return localStorage.getItem("mapbuddy_author") === "1";
}

window.addEventListener("DOMContentLoaded", () => {
  (async () => {
  // the basic math for the hexagon
  // COLS, ROWS = how many hexes to make
  // SIZE = radius of the hex(distance from center to a corner)
  // HEX_H = sqrt(3) * SIZE = height of a flat - top hex
  // DX = 1.5 * SIZE = horizontal distance between hex centers(flat - top spacing)
  // DY = HEX_H = vertical distance between hex centers
  const COLS = 52;
  const ROWS = 33;
  const SIZE = 22;
  const HEX_H = Math.sqrt(3) * SIZE;
  const DX = 1.5 * SIZE;
  const DY = HEX_H;

  const PAD = 20;
  const KEY = "hexmap_51x32_offset_v1";

  const SEED_URL = "./seeds/campaign_default.json";
  const SEED_VER = "2026-02-27-02"; // bump this when you update the seed

  const ZOOM_FACTOR = 0.6;
  const ZOOM_IN_MS  = 360;
  const ZOOM_OUT_MS = 420;

  let baseViewBox = null;
  let zoomed = false;
  let lastSelectedKey = null;
  let animToken = 0;

  let data = {};

  // Readers: load seed ONLY if no campaign exists yet
  if (!isAuthorMode() && !localStorage.getItem(KEY)) {
    await importCampaignFromUrl({
      url: SEED_URL,
      hexStorageKey: KEY,
      cacheBust: `v=${SEED_VER}`
    });
  }

  // Now load the (possibly seeded) state into memory
  data = JSON.parse(localStorage.getItem(KEY) || "{}");

  const svg = document.getElementById("grid");
  const statusEl = document.getElementById("status");
  const hexIdEl = document.getElementById("hexId");
  const notesEl = document.getElementById("notes");
  const colorEl = document.getElementById("color");
  const paletteEl = document.getElementById("palette");

  const iconBtn = document.getElementById("iconBtn");
  const iconPicker = document.getElementById("iconPicker");
  const iconGrid = document.getElementById("iconGrid");

  let selectedKey = null;
  let selectedPoly = null;

  const params = new URLSearchParams(location.search);
  const returnHex = params.get("hex");

// helper functions
  // save() — writes the data object to localStorage
  // key(c, r) — turns a column / row into a stable string like "12,8"
  // ensure(c, r) — guarantees data["c,r"] exists and has expected fields(c, n, icon)

  function save(){ localStorage.setItem(KEY, JSON.stringify(data)); }
  
  function key(c,r){ return `${c},${r}`; }

  function ensure(c,r){
    const k = key(c,r);
    data[k] ??= { c: null, n: "", icon: "" };
    if (data[k].icon === undefined) data[k].icon = "";
    return data[k];
  }

  function normalizeIcon(s) {
    // strips emoji variation selectors so "🏰" / "🏰︎" / "🏰️" compare the same
    return String(s || "").replace(/[\uFE0E\uFE0F]/g, "");
  }

  function isDungeonEnabledByIcon(h) {
    return normalizeIcon(h?.icon) === "🏰";
  }

  function refreshDungeonBtn() {
    const btn = document.getElementById("openDungeonBtn");
    if (!btn) return;

    if (!selectedKey) {
      btn.disabled = true;
      btn.title = "Select a hex first.";
      return;
    }

    const h = data[selectedKey] || null;
    const ok = isDungeonEnabledByIcon(h);

    btn.disabled = !ok;
    btn.title = ok
      ? "Open the dungeon linked to this hex."
      : 'Add the "🏰︎" icon to enable a dungeon on this hex.';
  }

// ********************************************************************
// the camera system for panning and zooming upon double click of a hex

  function setViewBox(x, y, w, h){
    svg.setAttribute("viewBox", `${x} ${y} ${w} ${h}`);
  }
  function getCurrentViewBox(){
    const vb = svg.viewBox.baseVal;
    return { x: vb.x, y: vb.y, w: vb.width, h: vb.height };
  }
  function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }

  function getZoomBoxForCenter(cx, cy){
    if (!baseViewBox) return null;

    const zw = baseViewBox.w * ZOOM_FACTOR;
    const zh = baseViewBox.h * ZOOM_FACTOR;

    const minX = baseViewBox.x;
    const minY = baseViewBox.y;
    const maxX = baseViewBox.x + baseViewBox.w - zw;
    const maxY = baseViewBox.y + baseViewBox.h - zh;

    const x = clamp(cx - zw/2, minX, maxX);
    const y = clamp(cy - zh/2, minY, maxY);

    return { x, y, w: zw, h: zh };
  }

  function easeInOutCubic(t){
    return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3)/2;
  }
  function animateViewBox(from, to, ms){
    animToken++;
    const myToken = animToken;
    const start = performance.now();

    function step(now){
      if (myToken !== animToken) return;
      const t = Math.min(1, (now - start) / ms);
      const e = easeInOutCubic(t);

      const x = from.x + (to.x - from.x) * e;
      const y = from.y + (to.y - from.y) * e;
      const w = from.w + (to.w - from.w) * e;
      const h = from.h + (to.h - from.h) * e;

      setViewBox(x, y, w, h);

      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

// ************************************************************************

// Use *hexSvgGrid module* to calculate hex center, points and svg bounds
  const hexMath = makeHexMath({ COLS, ROWS, SIZE, PAD });
  const { center, points, computeBounds } = hexMath;
// **************************************************************************


// these paint the stored color and add a gold frame if the hex is selected (and remove if not)
  function setVisual(poly, c, r){
    const h = ensure(c,r);

    poly.style.transition = "fill-opacity 1000ms ease";

    if (h.c){
      poly.setAttribute("fill", h.c);
      poly.setAttribute("fill-opacity", "0.95");
    } else {
      poly.setAttribute("fill", "#ffffff");
      poly.setAttribute("fill-opacity", "0.03");
    }

    poly.setAttribute("stroke", "rgba(255,255,255,0.55)");
    poly.setAttribute("stroke-width", "1");
    poly.style.cursor = "pointer";
    poly.style.pointerEvents = "all";

    if (poly._hexIcon) {
      const icon = h.icon || "";
      poly._hexIcon.textContent = icon;
      poly._hexIcon.style.display = icon ? "block" : "none";
    }
  }

  function setSelected(poly, on){
    if (!poly) return;
    if (on){
      poly.setAttribute("stroke", "#ffd54a");
      poly.setAttribute("stroke-width", "3");
    } else {
      poly.setAttribute("stroke", "rgba(255,255,255,0.55)");
      poly.setAttribute("stroke-width", "1");
    }
  }
// ************************************************************************

// popover icon table for adding to hexes
// adds "open" class to CSS to display
  const ICONS = [
    "⚓︎", "✶", "☠︎",
    "⚔︎", "🏰︎", "☘︎",
    "❖", "✚", "∅"
  ];

  function closeIconPicker(){
    iconPicker.classList.remove("open");
    iconPicker.setAttribute("aria-hidden", "true");
  }

  function openIconPicker(){
    if (!selectedKey) return;

    iconPicker.classList.add("open");
    iconPicker.setAttribute("aria-hidden", "false");

    // finding relative location for placing icon table on screen
    const b = iconBtn.getBoundingClientRect();
    const p = document.getElementById("panel").getBoundingClientRect();

    const pickerWidth = iconPicker.getBoundingClientRect().width;

    // The distance from the panel’s left edge needed to align the popover’s right edge with the button’s right edge.
    iconPicker.style.left = (b.right - p.left - pickerWidth) + "px";
    iconPicker.style.top  = (b.bottom - p.top + 8) + "px";
  }

  // Clears BOTH color + icon (as requested earlier)
  function clearSelectedHex(){
    if (!selectedKey || !selectedPoly) return;
    const [c,r] = selectedKey.split(",").map(Number);
    const h = ensure(c,r);

    h.c = null;
    h.icon = "";

    setVisual(selectedPoly, c, r);
    setSelected(selectedPoly, true);
    save();
  }

  // place the selected icon with the hex
  function applyIconToSelected(icon){
    if (!selectedKey || !selectedPoly) return;
    const [c,r] = selectedKey.split(",").map(Number);
    const h = ensure(c,r);

    h.icon = (icon === "∅") ? "" : icon;

    // Update SVG text directly for reliability
    const t = selectedPoly._hexIcon;
    if (t){
      t.textContent = h.icon;
      t.style.display = h.icon ? "block" : "none";
    }

    save();
    setSelected(selectedPoly, true);
    refreshDungeonBtn();
  }

  iconGrid.innerHTML = "";
  ICONS.forEach(ic => {
    const cell = document.createElement("div");
    cell.className = "iconCell";
    cell.textContent = ic;
    cell.addEventListener("click", () => {
      applyIconToSelected(ic);
      closeIconPicker();
    });
    iconGrid.appendChild(cell);
  });

  iconBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    if (iconPicker.classList.contains("open")) closeIconPicker();
    else openIconPicker();
  });

  document.addEventListener("click", () => closeIconPicker());
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeIconPicker();
  });

  function selectHex(c,r, poly){
    selectedKey = key(c,r);

    if (selectedPoly) setSelected(selectedPoly, false);
    selectedPoly = poly;
    setSelected(selectedPoly, true);

    const h = ensure(c,r);
    hexIdEl.textContent = `Hex Selected: ${selectedKey}`;
    notesEl.value = h.n || "";
    colorEl.value = h.c || "#2a2a2a";

    closeIconPicker();
    document.body.classList.add("panel-open");

    const { x, y } = center(c, r);

    if (lastSelectedKey === selectedKey) {
      zoomed = !zoomed;
    } else {
      lastSelectedKey = selectedKey;
    }

    refreshDungeonBtn();

    if (!baseViewBox) return;

    const from = getCurrentViewBox();
    let to, ms;

    if (zoomed) {
      to = getZoomBoxForCenter(x, y) || baseViewBox;
      ms = ZOOM_IN_MS;
    } else {
      to = { x: baseViewBox.x, y: baseViewBox.y, w: baseViewBox.w, h: baseViewBox.h };
      ms = ZOOM_OUT_MS;
    }

    animateViewBox(from, to, ms);
  }

  // ✅ KEEP ONLY ONE applyColorToSelected (animated)
  function applyColorToSelected(color){
    if (!selectedKey || !selectedPoly) return;
    const [c,r] = selectedKey.split(",").map(Number);
    const h = ensure(c,r);

    h.c = color;

    if (color){
      selectedPoly.setAttribute("fill", color);
      selectedPoly.setAttribute("fill-opacity", "0.0");

      requestAnimationFrame(() => {
        selectedPoly.setAttribute("fill-opacity", "0.95");
      });
    } else {
      selectedPoly.setAttribute("fill", "#ffffff");
      selectedPoly.setAttribute("fill-opacity", "0.03");
    }

    setSelected(selectedPoly, true);
    save();
  }
  
  // This calls hexSvgGrid to help create the hex grid as individual objects
  function buildGrid() {
    // buildHexSvgGrid will size the svg, clear it, and rebuild polygons + icon <text>
    const { w, h, count } = buildHexSvgGrid({
      svg,
      COLS,
      ROWS,
      center,
      points,
      computeBounds,

      // reuse your existing appearance rules (color, stroke, icon text)
      setVisual,

      // keep your existing click behavior
      onClickHex: (c, r, poly) => selectHex(c, r, poly),

      // replicate your existing hover behavior
      onEnterHex: (c, r, poly) => {
        if (poly !== selectedPoly && !ensure(c, r).c) poly.setAttribute("fill-opacity", "0.08");
      },
      onLeaveHex: (c, r, poly) => {
        if (poly !== selectedPoly) setVisual(poly, c, r);
      },

      makeIconText: true
    });

    // keep your zoom bookkeeping exactly as before
    setViewBox(0, 0, w, h);
    baseViewBox = { x: 0, y: 0, w, h };
    zoomed = false;
    lastSelectedKey = null;

    statusEl.textContent = `Hexes created: ${count} (expected ${COLS * ROWS})`;
  }

  // Panel bindings
  notesEl.addEventListener("input", () => {
    if (!selectedKey) return;
    data[selectedKey] ??= { c:null, n:"", icon:"" };
    if (data[selectedKey].icon === undefined) data[selectedKey].icon = "";
    data[selectedKey].n = notesEl.value;
    save();
  });

  colorEl.addEventListener("input", () => applyColorToSelected(colorEl.value));

  document.getElementById("clearColor").addEventListener("click", () => {
    clearSelectedHex();
  });

  document.getElementById("closePanel").addEventListener("click", () => {
    document.body.classList.remove("panel-open");
    closeIconPicker();
  });

  // palette creation
  const palette = ["#3c6270","#bbbf6e","#7c7b79","#85cf7e","#5fa458","#ffffff"];
  palette.forEach(c => {
    const d = document.createElement("div");
    d.className = "swatch";
    d.style.background = c;
    d.title = c;
    d.addEventListener("click", () => { colorEl.value = c; applyColorToSelected(c); });
    paletteEl.appendChild(d);
  });

  document.getElementById("openDungeonBtn").addEventListener("click", () => {
    if (!selectedKey) return alert("Select a hex first.");
    const h = data[selectedKey] || null;
    if (!isDungeonEnabledByIcon(h)) {
      return alert('This hex is not dungeon-enabled. Add the "🏰︎" icon first.');
    }
    const authorSuffix = isAuthorMode() ? "&author=1" : "";
    window.location.href = `dungeon.html?hex=${encodeURIComponent(selectedKey)}${authorSuffix}`;
  });

  // Campaign export/import/wipe (hex + all per-hex dungeons)
  document.getElementById("exportBtn").addEventListener("click", () => {
    exportCampaign({
      hexStorageKey: KEY,
      filenameBase: "mapbuddy_campaign"
    });
  });

  const importFile = document.getElementById("importFile");
  document.getElementById("importBtn").addEventListener("click", () => importFile.click());

  importFile.addEventListener("change", async () => {
    const file = importFile.files?.[0];
    if (!file) return;

    try {
      await importCampaignFromFile({ file, hexStorageKey: KEY });

      // reload hex data from localStorage into our live `data` object
      const fresh = JSON.parse(localStorage.getItem(KEY) || "{}");
      Object.keys(data).forEach(k => delete data[k]);
      Object.assign(data, fresh);

      buildGrid();

      if (baseViewBox) setViewBox(baseViewBox.x, baseViewBox.y, baseViewBox.w, baseViewBox.h);
      zoomed = false;
      lastSelectedKey = null;
      closeIconPicker();

      // clear selection UI
      selectedKey = null;
      if (selectedPoly) setSelected(selectedPoly, false);
      selectedPoly = null;
      hexIdEl.textContent = "Click a hex…";
      notesEl.value = "";

      alert("Campaign imported.");
    } catch (err) {
      alert(err?.message || "Import failed.");
    } finally {
      importFile.value = ""; // allow re-importing same file
    }
  });

  document.getElementById("wipeBtn").addEventListener("click", () => {
    const res = wipeCampaign({
      hexStorageKey: KEY,
      confirmFn: confirm
    });
    if (!res.wiped) return;

    // clear live state + UI
    Object.keys(data).forEach(k => delete data[k]);
    buildGrid();

    if (baseViewBox) setViewBox(baseViewBox.x, baseViewBox.y, baseViewBox.w, baseViewBox.h);
    zoomed = false;
    lastSelectedKey = null;
    closeIconPicker();

    selectedKey = null;
    if (selectedPoly) setSelected(selectedPoly, false);
    selectedPoly = null;
    hexIdEl.textContent = "Click a hex…";
    notesEl.value = "";

    alert(`Campaign wiped. Removed ${res.wipedDungeons} linked dungeon saves.`);
  });

  data = JSON.parse(localStorage.getItem(KEY) || "{}");
  buildGrid();

  if (returnHex && data.hasOwnProperty(returnHex)) {
    const [c, r] = returnHex.split(",").map(Number);
    const poly = grid.byCR.get(returnHex)?.poly;
    if (poly) selectHex(c, r, poly);
  }
  })();
});
